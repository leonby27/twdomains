<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Timeweb Домены</title>
    <!--
      SPA-фолбэк для GitHub Pages (BrowserRouter без серверных рерайтов).
      Любой прямой заход/перезагрузка на /twdomains/<path> отдаёт этот 404 →
      кодируем путь в query и редиректим на корень, где index.html его раскодирует.
      pathSegmentsToKeep = 1 — сохраняем сегмент base «/twdomains».
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
