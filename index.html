<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Цвет панелей браузера/ОС. Обновляется под тему в src/app/model/init.js;
         нижний системный бар Android красится этим значением при установке как PWA. -->
    <meta name="theme-color" content="#f5f6f8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Личный кабинет регистратора доменов Timeweb: поиск и управление доменными зонами, просмотр статусов и сроков регистрации, работа с реселлерами и генерация кода подтверждения."
    />
    <title>Панель управления доменами Timeweb</title>
    <!-- Раскодирование пути после SPA-редиректа из 404.html (GitHub Pages). -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/index.jsx"></script>
  </body>
</html>
